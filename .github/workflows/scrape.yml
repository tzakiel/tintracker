name: Scrape (Pipestud)

on:
  workflow_dispatch:       # triggered by cron-job.org via API

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml requests
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Consolidate tins
        run: python consolidate.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/products.json docs/canonical.json docs/unmatched.log
          git diff --cached --quiet || git commit -m "Weekly scrape $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
