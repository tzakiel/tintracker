name: Weekly Scrape

on:
  schedule:
    # Saturday afternoon ET — a few attempts an hour apart in case Cloudflare
    # blocks an individual run. The first success updates the data; the guard
    # in scraper.py keeps a blocked run from wiping anything.
    # Minutes are off :00 to dodge GitHub's top-of-hour runner congestion.
    - cron: "17 18 * * 6"  # ~1pm ET
    - cron: "17 19 * * 6"  # ~2pm ET
    - cron: "17 20 * * 6"  # ~3pm ET
    - cron: "48 21 * * *"   # one-off: 21:48 UTC today — DELETE after it runs
  workflow_dispatch:       # allows manual run from GitHub website

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/products.json
          git diff --cached --quiet || git commit -m "Weekly scrape $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
