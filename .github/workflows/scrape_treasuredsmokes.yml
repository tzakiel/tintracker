name: Daily Scrape (Treasured Smokes)

on:
  workflow_dispatch:       # triggered by cron-job.org via API

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml requests

      - name: Run scraper
        run: python scrape_treasuredsmokes.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/products_treasuredsmokes.json
          git diff --cached --quiet || git commit -m "Daily Treasured Smokes scrape $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
