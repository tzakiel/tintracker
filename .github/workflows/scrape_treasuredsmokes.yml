name: Scrape (Treasured Smokes)

on:
  workflow_dispatch:       # triggered by cron-job.org via API

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml requests

      - name: Run scraper
        run: python scrape_treasuredsmokes.py

      - name: Commit updated data
        env:
          SRC: docs/products_treasuredsmokes.json
          MSG: "Daily Treasured Smokes scrape"
        run: bash .github/commit-scrape.sh
