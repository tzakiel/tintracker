  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Tin Tracker",
    "url": "https://tintracker.xyz/",
    "description": "Tracks the resale value of collectible pipe tobacco tins across auction and retail sources."
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Work+Sans:wght@400;500;600;700&family=Uncial+Antiqua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      /* stop iOS Safari from auto-inflating long text blocks (the coffee line
         was rendering larger than the tagline on iPhone because of this) */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      /* cozy café "tablecloth" — soft dot grid on warm cream */
      background-color: var(--bg-page);
      background-image: var(--bg-dot-gradient);
      background-size: var(--bg-dot-size);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Young Serif — display face, for branding & headings only */
    header h1, .detail-name, .detail-section-title {
      font-family: var(--font-display);
      font-weight: var(--weight-normal);
    }

    /* ── header ── */
    header {
      background: var(--bg-header);
      color: var(--text-header);
      padding: var(--padding-header);
      text-align: center;
      box-shadow: var(--shadow-header);
    }
    header h1 { font-size: var(--text-3xl); letter-spacing: var(--tracking-wide); }
    .brand { display: flex; align-items: center; justify-content: center; gap: .8rem; }
    .brand-tin { width: 3.2rem; height: auto; flex: 0 0 auto; color: var(--text-header); }
    header p  { margin-top: .35rem; font-size: var(--text-md); color: var(--text-header-sub); text-wrap: balance; }
    header p.coffee { margin-top: .6rem; font-size: var(--text-md); color: var(--text-header-sub); }
    header p.coffee a { color: var(--text-header-link); text-decoration: underline; text-underline-offset: 2px; }
    header p.coffee a:hover { color: #fff; }
    header p.coffee a svg { width: 1.05em; height: 1.05em; vertical-align: -.2em; margin-left: .3em; }


    /* ── layout ── */
    #source-filters { max-width: 1400px; margin: 2rem auto 0; padding: 0 1.5rem; }
    #main-view, #detail-view { max-width: 1400px; margin: 0 auto 2rem; padding: 0 1.5rem; }
    #detail-view { display: none; }

    /* ── search ── */
    .search-wrap { position: relative; margin-bottom: 1.5rem; }
    .search-wrap .search-icon {
      position: absolute;
      left: 1.05rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #a88060;
      width: 1rem;
      height: 1rem;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.875rem 1.1rem 0.875rem 2.85rem;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.95rem;
      border: 1.5px solid #e5d5be;
      border-radius: 13px;
      background: var(--bg-card);
      color: #1a0f08;
      outline: none;
      box-shadow: 0 2px 10px rgba(26,15,8,.07);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap input::placeholder { color: #a88060; }
    .search-wrap input:focus {
      border-color: #d45d35;
      box-shadow: 0 2px 10px rgba(26,15,8,.07), 0 0 0 3px rgba(212,93,53,.13);
    }

    #dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg-dropdown);
      border: 2px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-dropdown);
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
    }
    #dropdown.open { display: block; }
    .dd-item { padding: .55rem 1rem; cursor: pointer; font-size: var(--text-md); border-bottom: 1px solid var(--border-default); }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.active { background: var(--bg-surface); }
    .dd-item span { font-size: var(--text-sm); color: var(--text-muted); margin-left: .5rem; }

    /* ── source filter chips ── */
    #source-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .6rem .8rem;
      margin-bottom: 1.1rem;
    }
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5rem;
    }
    .chip-group-label {
      font-family: 'Work Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .chip-divider {
      align-self: stretch;
      width: 1.5px;
      background: var(--border-default);
    }
    @media (max-width: 600px) {
      #source-filters { flex-direction: column; align-items: stretch; }
      .chip-divider { width: auto; height: 1.5px; }
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 1rem;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.80rem;
      font-weight: 500;
      border: 1.5px solid #e5d5be;
      border-radius: var(--radius-pill);
      background: var(--bg-chip);
      color: #7a5a3c;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.13s ease;
    }
    .chip:hover:not(.on):not(.active) { border-color: #d45d35; color: #b84a22; background: #fdf0eb; }
    .chip.on, .chip.active {
      background: #d45d35;
      border-color: #d45d35;
      color: #ffffff;
      font-weight: 600;
    }

    #status { color: var(--text-link); font-style: italic; margin-bottom: .9rem; min-height: 1.4em; font-size: var(--text-md); }
    #meta   { color: var(--text-muted); font-size: var(--text-sm); margin-bottom: 1rem; font-style: italic; }

    /* ── desktop table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    thead { background: var(--bg-card); }
    thead tr { border-bottom: 1.5px solid #ede5d8; }
    thead th {
      padding: var(--padding-cell); text-align: left;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #a88060;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: #7a5a3c; }
    .sort-ind { font-size: var(--text-xs); opacity: .9; }

    /* sort control shown only on mobile (table headers are hidden there) */
    #mobile-sort, .detail-mobile-sort {
      display: none;
      font: inherit; font-size: var(--text-md);
      padding: .5rem .9rem; margin-bottom: 1rem;
      border: 2px solid var(--border-default); border-radius: var(--radius-pill);
      background: var(--bg-card); color: var(--text-strong); width: 100%;
    }
    tbody tr { cursor: pointer; border-bottom: 1px solid #f2eae0; transition: background 0.1s; }
    tbody tr:nth-child(even) { background: var(--bg-row-alt); }
    tbody tr:hover { background: #fdf0eb; }
    tbody td { padding: var(--padding-cell); font-size: var(--text-md); vertical-align: middle; }
    /* The product name is the flexible column: it greedily takes leftover width
       (width:100%) but max-width:0 stops its text from forcing the table wider,
       so on narrower desktops it shrinks and ellipsizes instead of overflowing.
       The meta/price columns are nowrap, so they hug their content. */
    .col-name {
      width: 100%;
      max-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Young Serif', Georgia, serif;
      font-size: 0.96rem;
      color: #5c3820;
      line-height: 1.3;
    }
    .col-price { white-space: nowrap; font-size: 0.90rem; font-weight: 700; color: #1a0f08; }
    .col-ppo   { white-space: nowrap; font-size: 0.78rem; color: #7a5a3c; }
    .col-meta  { font-size: 0.77rem; color: #a88060; white-space: nowrap; }
    /* Safety net: if even the shrunk name + content columns can't fit a very
       narrow desktop window, scroll the table rather than breaking the page. */
    #results { overflow-x: auto; }

    /* ── pagination ── */
    .pagination {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      margin: 1.25rem 0 .25rem;
    }
    .page-info {
      width: 100%;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-style: italic;
      margin-bottom: .15rem;
    }
    .page-btn {
      min-width: 2.1rem;
      padding: .38rem .6rem;
      font: inherit;
      font-size: var(--text-base);
      border: 2px solid var(--border-default);
      border-radius: var(--radius-pill);
      background: var(--bg-card);
      color: var(--text-soft);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .page-btn:hover:not(:disabled):not(.active) { border-color: var(--accent); color: var(--accent); }
    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      cursor: default;
    }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-ellipsis { color: var(--text-faint); padding: 0 .15rem; user-select: none; }

    /* ── mobile cards ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.3rem; }
      .brand { gap: .6rem; }
      .brand-tin { width: 2.4rem; }
      header { padding-left: 1rem; padding-right: 1rem; }
      header p { max-width: 22rem; margin-left: auto; margin-right: auto; }

      table, thead, tbody, tr, td { display: block; }
      thead { display: none; }

      /* the table itself is just a layout container on mobile — only the cards show */
      table {
        background: transparent;
        box-shadow: none;
        border-radius: 0;
      }

      tbody tr {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        margin-bottom: .85rem;
        padding: .9rem 1.1rem;
        box-shadow: var(--shadow-mobile-card);
        cursor: pointer;
        /* 3-col grid: name/price/source span all; weight·year·updated share one row */
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        column-gap: .6rem;
        row-gap: .15rem;
        align-items: start;
      }
      tbody tr:nth-child(even) { background: var(--bg-card); }
      tbody tr:hover { background: var(--bg-row-hover); }

      /* card field order: name title, price, the meta trio, then source */
      .col-name   { order: -3; grid-column: 1 / -1; }
      .col-price  { order: -2; grid-column: 1 / -1; }
      td.col-source {
        order: 1; grid-column: 1 / -1;
        margin-top: .85rem;
        border-top: 1px solid var(--border-default);
        padding-top: 1rem !important;
      }

      /* product name = card title */
      .col-name {
        width: auto;
        max-width: none;
        white-space: normal;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        text-overflow: ellipsis;
        font-size: .95rem;
        font-weight: var(--weight-semibold);
        color: var(--text-link);
        margin: 0 0 .55rem;
        padding: 0 0 .55rem;   /* zero side padding so the title left-aligns with the rest */
        border-bottom: 1px solid var(--border-default);
      }

      /* every other field: label on the left, value on the right */
      td.col-meta, td.col-price {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        width: auto;
        white-space: normal;
        padding: .2rem 0;
        font-size: var(--text-md);
        color: var(--text-muted);
      }
      td.col-meta::before, td.col-price::before {
        content: attr(data-label);
        flex: 0 0 auto;
        color: var(--text-label);
        font-size: var(--text-xs);
        font-weight: var(--weight-semibold);
        text-transform: uppercase;
        letter-spacing: .04em;
        align-self: center;
      }
      td.col-price {
        font-size: .95rem;
        font-weight: var(--weight-bold);
        color: var(--text-primary);
      }
      /* Weight · Avg$/oz · Year: stacked label-over-value, three across one row */
      td.col-weight, td.col-ppo, td.col-year {
        flex-direction: column;
        justify-content: flex-start;
        gap: .15rem;
        padding: .4rem 0 0;
        font-size: var(--text-base);
      }
      td.col-weight  { align-items: flex-start; }
      td.col-ppo     { align-items: center; display: flex; color: var(--text-muted); width: auto; white-space: nowrap; }
      td.col-year    { align-items: flex-end; }
      td.col-weight::before, td.col-ppo::before, td.col-year::before { align-self: auto; }
      td.col-ppo::before {
        content: attr(data-label);
        color: var(--text-label);
        font-size: var(--text-xs);
        font-weight: var(--weight-semibold);
        text-transform: uppercase;
        letter-spacing: .04em;
      }

      /* Last Updated: full-width inline row with separator above */
      td.col-updated {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        align-items: baseline;
        padding: .45rem 0 0;
        margin-top: .3rem;
        border-top: 1px solid var(--border-default);
        font-size: var(--text-base);
      }

      /* History table on mobile: each row becomes a labeled card */
      .history-table { overflow: visible; }
      .history-table tbody tr {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: .1rem .5rem;
        background: var(--bg-surface);
        border-radius: var(--radius-md);
        margin-bottom: .55rem;
        padding: .6rem .75rem;
        cursor: default;
        box-shadow: none;
      }
      .history-table td {
        display: block;
        padding: .1rem 0;
        font-size: var(--text-base);
        font-weight: normal;
        color: var(--text-primary);
        white-space: normal;
      }
      .history-table td::before {
        display: block;
        content: attr(data-label);
        color: var(--text-label);
        font-size: var(--text-2xs);
        font-weight: var(--weight-semibold);
        text-transform: uppercase;
        letter-spacing: .04em;
        margin-bottom: .1rem;
      }
      .history-table td:nth-child(5),
      .history-table td:nth-child(6) { grid-column: 1 / -1; }
      .history-table td.price { font-weight: var(--weight-bold); color: var(--text-primary); }
      .history-table .listing-name { max-width: none; margin-top: .2rem; }

      #mobile-sort, .detail-mobile-sort { display: block; }

      /* main view only: pull the pill closer to the search bar's own spacing,
         then tuck it right up against the listings — #meta is an empty spacer
         whose margin would otherwise collapse through and re-open the gap below */
      .search-wrap { margin-bottom: 2.25rem; }
      #mobile-sort { margin-bottom: .35rem; }
      #meta { margin-bottom: 0; }
      /* #status also sits empty on the default (no-search) view — its
         reserved min-height/margin was re-opening the gap #meta closed */
      #status:empty { min-height: 0; margin-bottom: 0; }

      /* iOS Safari zooms the whole page in on focus for any input/select
         with a computed font-size under 16px, which is what made the layout
         feel "unlocked" and horizontally swipeable on phones */
      .search-wrap input,
      #mobile-sort, .detail-mobile-sort { font-size: var(--text-rg); }
    }


    .tin-badge {
      font-size: var(--text-xs); color: var(--text-accent); margin-left: .5rem;
      white-space: nowrap; font-weight: var(--weight-semibold);
    }
    .pill {
      display: inline-block;
      padding: 0.17rem 0.55rem;
      background: #f0ebe0;
      border: 1px solid #ddd0bc;
      border-radius: 999px;
      font-size: 0.68rem;
      color: #7a5a3c;
      white-space: nowrap;
      font-family: 'Work Sans', sans-serif;
    }
    .listings-badge {
      display: inline-block;
      padding: 0.14rem 0.50rem;
      background: #fdf0eb;
      color: #b84a22;
      border-radius: 999px;
      font-size: 0.67rem;
      font-weight: 600;
      margin-left: 0.40rem;
      font-family: 'Young Serif', serif;
    }
    .history-table td.price { font-weight: var(--weight-bold); color: var(--text-primary); }
    /* full original scraped listing title, tucked under its source link */
    .history-table .listing-name {
      display: block; margin-top: .2rem; font-size: var(--text-xs); font-weight: var(--weight-normal);
      color: var(--text-faint); line-height: 1.3; white-space: normal; max-width: 40ch;
    }

    /* ── detail page ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: none;
      border: none;
      color: var(--accent);
      font: inherit;
      font-size: var(--text-md);
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
    }
    .back-btn:hover { color: var(--accent-hover); }
    .back-btn svg { width: 14px; height: 14px; }

    .detail-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: var(--padding-card);
      box-shadow: var(--shadow-card-lg);
    }
    .detail-hero {
      background: #FFDBC7;
      border-radius: 18px;
      padding: 2rem 2.2rem;
      color: #1a0f08;
      margin-bottom: 1.5rem;
    }
    .detail-name {
      font-family: 'Young Serif', Georgia, serif;
      font-size: 1.55rem;
      line-height: 1.3;
      margin-bottom: 1.2rem;
      color: #1a0f08;
    }
    .detail-price {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.3rem;
      color: #1a0f08;
    }
    .detail-ppo {
      font-size: 0.95rem;
      color: #5c3820;
    }
    .detail-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .4rem 1.25rem;
      font-size: var(--text-md);
      margin-bottom: 1.5rem;
      align-items: baseline;
    }
    .detail-meta .lbl { color: var(--text-muted); font-size: var(--text-sm); text-transform: uppercase; letter-spacing: var(--tracking-wider); }
    .detail-meta .val { color: var(--text-primary); }
    .detail-meta a { color: var(--text-link); }

    .detail-section-title {
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: var(--tracking-widest);
      color: var(--text-muted);
      margin: 1.5rem 0 .6rem;
      border-top: 1px solid var(--border-default);
      padding-top: 1rem;
    }
    .history-table { box-shadow: none; border-radius: var(--radius-sm); overflow: hidden; }
    .history-table thead { background: var(--bg-card); }
    .history-table thead tr { border-bottom: 1.5px solid #ede5d8; }
    .history-table thead th {
      font-family: 'Work Sans', sans-serif;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #a88060;
      white-space: nowrap;
    }
    .history-table thead th:hover { color: #7a5a3c; }
    .history-table td, .history-table th { padding: .5rem .85rem; font-size: var(--text-sm); }
    .history-table td { overflow-wrap: break-word; }

    /* ── detail $/oz chart ── */
    .ppo-chart-section {
      position: relative;
      border-top: 1px solid var(--border-default);
      padding-top: 1rem;
      margin-bottom: 1.5rem;
    }
    .ppo-chart-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-widest);
      color: var(--text-muted);
      margin-bottom: .6rem;
    }
    .ppo-chart-host { width: 100%; }
    .ppo-chart-section svg { width: 100%; height: auto; display: block; }
    .ppo-dot { cursor: pointer; transition: r .1s, fill-opacity .1s; }
    .ppo-dot:hover { fill-opacity: 1; }
    .ppo-tooltip {
      position: absolute;
      background: var(--bg-tooltip);
      color: var(--text-tooltip);
      padding: .5rem .8rem;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, calc(-100% - 10px));
      z-index: 20;
      box-shadow: var(--shadow-tooltip);
      line-height: 1.55;
    }
    .ppo-tooltip::after {
      content: "";
      position: absolute;
      left: 50%; bottom: -5px;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--bg-tooltip);
      border-bottom: none;
    }
    .ppo-tooltip[hidden] { display: none; }
    .ppo-tt-ppo  { font-weight: var(--weight-bold); font-size: var(--text-md); }
    .ppo-tt-row  { color: var(--text-header-sub); margin-top: .1rem; }
    .detail-empty { color: var(--text-muted); font-size: var(--text-md); padding: 1rem 0; }

    /* ── footer ── */
    footer { text-align: center; padding: 2rem 1rem; color: var(--text-faint); font-size: var(--text-sm); }
    /* crawl path to the static per-tin pages — deliberately quiet, but kept
       visible/legible: fully hidden links violate search-engine spam policies */
    .footer-tin-index { display: block; margin-top: .8rem; font-size: var(--text-2xs); color: var(--text-placeholder); opacity: .55; text-decoration: none; }
    .footer-tin-index:hover { opacity: 1; text-decoration: underline; }
    .footer-motif { display: flex; justify-content: center; gap: .8rem; margin-bottom: .6rem; }
    .footer-motif svg { width: 20px; height: 20px; color: #c9a06f; opacity: .8; }
  .easter-egg-row td {
    font-family: var(--font-decorative);
    font-weight: bold;
    color: #4a8c5c;
  }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1><a href="#" onclick="goHome();return false;" style="color:inherit;text-decoration:none;">Tin Tracker</a></h1>
    <svg class="brand-tin" viewBox="6 22 94 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
      <!-- body, rounded corners (3/4 view) -->
      <path d="M15.52 39.76 L30.48 30.24 Q34 28 43.6 28.96 L84.4 33.04 Q94 34 94 36.88 L94 49.12 Q94 52 90.48 54.24 L75.52 63.76 Q72 66 62.4 65.04 L21.6 60.96 Q12 60 12 57.12 L12 44.88 Q12 42 15.52 39.76 Z" fill="currentColor" fill-opacity=".10" stroke-width="2.2"/>
      <!-- lid top face, rounded corners -->
      <path d="M21.6 42.96 L62.4 47.04 Q72 48 75.52 45.76 L90.48 36.24 Q94 34 84.4 33.04 L43.6 28.96 Q34 28 30.48 30.24 L15.52 39.76 Q12 42 21.6 42.96 Z" fill="currentColor" fill-opacity=".14" stroke-width="2.2"/>
      <!-- front-long & right-short top edges + front-right vertical -->
      <path d="M12 42 L72 48 L94 34 M72 48 L72 66" stroke-width="2.2"/>
      <!-- lid seam wrapping the body (front + right) -->
      <path d="M12 50 L72 56 L94 42" stroke-width="1.6" opacity=".85"/>
      <!-- faint label panel on the lid -->
      <path d="M21 41 L67.8 45.8 L85 34.9 L38.2 30.2 Z" stroke-width="1.3" opacity=".5"/>
    </svg>
  </div>
  <p>A simple function: track the value of resale pipe tobacco tins.</p>
  <p class="coffee">If this made you happy in any way, feel free to <a href="mailto:tzakiel@gmail.com">say thanks</a> or 
    <a href="https://buymeacoffee.com/vandal_heart" target="_blank" rel="noopener">buy me a coffee<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h11v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4z"/><path d="M16 10h2.5a2.2 2.2 0 0 1 0 4.4H16"/><path d="M8 2.6q1 1.2 0 2.6M11 2.6q1 1.2 0 2.6M14 2.6q1 1.2 0 2.6"/><path d="M5 21h12"/></svg></a>.</p>
</header>

<!-- Persistent source filter chips (shown on both main and detail views) -->
<div id="source-filters"></div>

<!-- Main list view -->
<div id="main-view">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="6.5" cy="6.5" r="4"/>
      <line x1="10" y1="10" x2="14" y2="14"/>
    </svg>
    <input id="q" type="text" placeholder="Search by product name…" autocomplete="off" />
    <div id="dropdown"></div>
  </div>

  <select id="mobile-sort" aria-label="Sort by">
    <option value="updated:desc">Sort: Last Updated (newest)</option>
    <option value="updated:asc">Sort: Last Updated (oldest)</option>
    <option value="name:asc">Sort: Name (A–Z)</option>
    <option value="name:desc">Sort: Name (Z–A)</option>

    <option value="year:desc">Sort: Year (new–old)</option>
    <option value="year:asc">Sort: Year (old–new)</option>
    <option value="price:asc">Sort: Price (low–high)</option>
    <option value="price:desc">Sort: Price (high–low)</option>
    <option value="ppo:asc">Sort: $/oz (low–high)</option>
    <option value="ppo:desc">Sort: $/oz (high–low)</option>
    <option value="weight:asc">Sort: Weight (light–heavy)</option>
    <option value="weight:desc">Sort: Weight (heavy–light)</option>
  </select>
  <div id="meta"></div>
  <div id="status">Loading catalog…</div>
  <noscript>
    <p>This tracker needs JavaScript to search and chart prices. A static,
    browsable index of every tracked tin is available at
    <a href="/tin/">the tin index</a>.</p>
  </noscript>
  <div id="results"></div>
</div>

<!-- Detail view -->
<div id="detail-view">
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
      <polyline points="10,3 5,8 10,13"/>
    </svg>
    Back
  </button>
  <div id="detail-content"></div>
</div>

<footer>
  <div class="footer-motif">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 19C5 11 11 5 19 5c0 8-6 14-14 14z"/>
      <path d="M5 19 15 9"/>
    </svg>
  </div>
  Prices collected automatically. ALPHA release — expect bugs &amp; inaccuracies.
  <a class="footer-tin-index" href="/tin/">Tin index</a>
</footer>

<script>
  let TINS = [];                    // consolidated tins
  let ENRICH = {};                  // raw name -> { weight, year } from canonical
  let SORT = { key: "updated", dir: "desc" };
  let DETAIL_SORT = { key: "date", dir: "desc" };
  const PAGE_SIZE = 50;             // max rows per page (both views)
  let PAGE = 1;                     // current page, main list view
  let DETAIL_PAGE = 1;              // current page, detail listings table
  let _mainCtx = null;              // last main-view render args, for page nav
  let ACTIVE_SOURCES = new Set();   // sources currently shown (empty = none)
  let lastListState = null; // remembers what was showing before detail
  let currentDetailTin = null;      // tin currently shown in detail view

  // tin weight as grams, for numeric size sorting ("2oz" -> ~56.7, "50g" -> 50)
  function weightGrams(q) {
    if (!q) return -1;
    const m = q.match(/([\d.\-\/]+)\s*(oz|g)/i);
    if (!m) return -1;
    let num = 0;
    m[1].split("-").forEach(part => {
      if (part.includes("/")) { const [a, b] = part.split("/"); num += (+a) / (+b); }
      else num += parseFloat(part) || 0;
    });
    return /oz/i.test(m[2]) ? num * 28.3495 : num;
  }

  /* ── money helpers ── */
  function parseMoney(s) {
    const m = (s || "").match(/[\d,]+(?:\.\d+)?/);
    return m ? parseFloat(m[0].replace(/,/g, "")) : null;
  }

  const qEl       = document.getElementById("q");
  const dropEl    = document.getElementById("dropdown");
  const statusEl  = document.getElementById("status");
  const resultsEl = document.getElementById("results");
  const metaEl    = document.getElementById("meta");
  const mainView  = document.getElementById("main-view");
  const detailView= document.getElementById("detail-view");
  const detailContent = document.getElementById("detail-content");

  const BASE_TITLE = document.title;

  // URL slug for a tin — mirrors generate_seo.tin_slug (id is "brand|blend").
  function tinSlug(id) { return String(id || "").replace(/\|/g, "-"); }

  document.getElementById("back-btn").addEventListener("click", showMain);
  window.addEventListener("popstate", (e) => {
    const t = e.state && e.state.detail ? TINS.find(x => x.id === e.state.detail) : null;
    if (t) openDetail(t);
    else if (detailView.style.display !== "none") showMain(false);
  });

  /* ── formatting ── */
  function fmt(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  }

  // Escape raw scraped text before injecting it into the DOM.
  function esc(s) {
    return String(s ?? "").replace(/[&<>"]/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  // date + time of capture, in the viewer's local timezone (detail page only)
  function fmtDateTime(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleString("en-US", {
      year: "numeric", month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit", timeZoneName: "short",
    });
  }

  /* ── detail page ── */

  function renderDetailTable(t, container) {
    const rows = [];
    for (const sz of (t.sizes || [])) {
      const grams = weightGrams(sz.quantity);
      const oz = grams > 0 ? grams / 28.3495 : null;
      for (const m of (sz.members || [])) {
        if (!ACTIVE_SOURCES.has(m.source)) continue;
        const price = parseMoney(m.price);
        rows.push({ ...m, weight: sz.quantity || null, ppo: (oz && price != null) ? price / oz : null });
      }
    }

    if (!rows.length) {
      container.innerHTML = '<p class="detail-empty">No listings match the current source filters.</p>';
      return;
    }

    const dir = DETAIL_SORT.dir === "desc" ? -1 : 1;
    const sorted = rows.slice().sort((a, b) => {
      switch (DETAIL_SORT.key) {
        case "year":   return ((parseInt(a.year) || 0) - (parseInt(b.year) || 0)) * dir;
        case "weight": return (weightGrams(a.weight) - weightGrams(b.weight)) * dir;
        case "price":  return ((parseMoney(a.price) ?? -1) - (parseMoney(b.price) ?? -1)) * dir;
        case "ppo":    return ((a.ppo ?? -1) - (b.ppo ?? -1)) * dir;
        case "source": return String(a.source || "").localeCompare(String(b.source || ""), "en", { sensitivity: "base" }) * dir;
        case "date":   return String(a.first_seen || "").localeCompare(String(b.first_seen || "")) * dir;
        default:       return 0;
      }
    });

    const arrow = k => DETAIL_SORT.key === k ? `<span class="sort-ind">${DETAIL_SORT.dir === "asc" ? "▲" : "▼"}</span>` : "";
    const cols = [
      { key: "year",   label: "Year"   },
      { key: "weight", label: "Weight" },
      { key: "price",  label: "Price"  },
      { key: "ppo",    label: "$/oz"   },
      { key: "source", label: "Source" },
      { key: "date",   label: "Date"   },
    ];
    // ── paginate (50 max per page) ──
    const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
    if (DETAIL_PAGE > totalPages) DETAIL_PAGE = totalPages;
    if (DETAIL_PAGE < 1) DETAIL_PAGE = 1;
    const pageStart = (DETAIL_PAGE - 1) * PAGE_SIZE;
    const pageRows = sorted.slice(pageStart, pageStart + PAGE_SIZE);

    const head = cols.map(c => `<th data-key="${c.key}">${c.label} ${arrow(c.key)}</th>`).join("");
    const body = pageRows.map(m => {
      const src = m.url
        ? `<a href="${m.url}" target="_blank" rel="noopener">${esc(m.source || "link")}</a>`
        : esc(m.source || "—");
      return `<tr>
        <td data-label="Year">${esc(m.year || "—")}</td>
        <td data-label="Weight">${esc(m.weight || "—")}</td>
        <td class="price" data-label="Price">${esc(m.price || "—")}</td>
        <td data-label="$/oz">${m.ppo != null ? "$" + m.ppo.toFixed(2) + "/oz" : "—"}</td>
        <td data-label="Source">${src}${m.name ? `<span class="listing-name">${esc(m.name)}</span>` : ""}</td>
        <td data-label="Date">${fmt(m.first_seen)}</td>
      </tr>`;
    }).join("");

    const n = rows.length;
    container.innerHTML = `
      <select class="detail-mobile-sort" aria-label="Sort listings by">
        <option value="year:desc">Sort: Year (newest first)</option>
        <option value="year:asc">Sort: Year (oldest first)</option>
        <option value="weight:desc">Sort: Weight (heavy first)</option>
        <option value="weight:asc">Sort: Weight (light first)</option>
        <option value="price:desc">Sort: Price (high first)</option>
        <option value="price:asc">Sort: Price (low first)</option>
        <option value="ppo:desc">Sort: $/oz (high first)</option>
        <option value="ppo:asc">Sort: $/oz (low first)</option>
        <option value="source:asc">Sort: Source (A–Z)</option>
        <option value="date:desc">Sort: Date (newest first)</option>
        <option value="date:asc">Sort: Date (oldest first)</option>
      </select>
      <div class="detail-section-title">${n} listing${n !== 1 ? "s" : ""}</div>
      <table class="history-table">
        <thead><tr>${head}</tr></thead>
        <tbody>${body}</tbody>
      </table>
      ${pagerHTML(DETAIL_PAGE, totalPages, pageRows.length, n, n === 1 ? "listing" : "listings")}`;

    const detailSortSel = container.querySelector(".detail-mobile-sort");
    detailSortSel.value = `${DETAIL_SORT.key}:${DETAIL_SORT.dir}`;
    detailSortSel.addEventListener("change", () => {
      const [k, d] = detailSortSel.value.split(":");
      DETAIL_SORT.key = k; DETAIL_SORT.dir = d;
      DETAIL_PAGE = 1;   // re-sorting returns to the first page
      renderDetailTable(t, container);
    });

    container.querySelectorAll("thead th").forEach(th => {
      th.addEventListener("click", () => {
        const k = th.dataset.key;
        if (DETAIL_SORT.key === k) DETAIL_SORT.dir = DETAIL_SORT.dir === "asc" ? "desc" : "asc";
        else { DETAIL_SORT.key = k; DETAIL_SORT.dir = "asc"; }
        DETAIL_PAGE = 1;   // re-sorting returns to the first page
        renderDetailTable(t, container);
      });
    });

    container.querySelectorAll(".page-btn[data-page]").forEach(b => {
      b.addEventListener("click", () => {
        if (b.disabled) return;
        DETAIL_PAGE = parseInt(b.dataset.page, 10);
        renderDetailTable(t, container);
        window.scrollTo(0, 0);
      });
    });
  }

  function showMain(pushState = true) {
    if (pushState) history.back();
    mainView.style.display = "";
    detailView.style.display = "none";
    document.title = BASE_TITLE;
    window.scrollTo(0, 0);
  }

  // Clicking the header title always returns to the default home list, from
  // anywhere — including detail pages (where the list is hidden) and search.
  function goHome() {
    qEl.value = "";
    closeDropdown();
    // Replace current history entry with the clean base URL (strips hash, query,
    // and any detail pushState) without navigating backwards — history.back()
    // would risk leaving the site if the stack is shallow.
    history.replaceState(null, "", location.pathname);
    mainView.style.display = "";
    detailView.style.display = "none";
    document.title = BASE_TITLE;
    render();
    window.scrollTo(0, 0);
  }

  /* ── pagination helpers ── */
  // Page numbers to show: always first & last, plus a ±2 window around current,
  // with "…" gaps collapsed in between.
  function pageList(cur, total) {
    const want = new Set([1, total, cur - 2, cur - 1, cur, cur + 1, cur + 2]);
    const pages = [...want].filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
    const out = [];
    let prev = 0;
    for (const p of pages) {
      if (p - prev > 1) out.push("…");
      out.push(p);
      prev = p;
    }
    return out;
  }

  // Build the pager bar (range info + Prev / numbers / Next). Empty when ≤1 page.
  function pagerHTML(cur, total, shown, totalRows, noun) {
    if (total <= 1) return "";
    const lo = (cur - 1) * PAGE_SIZE + 1;
    const hi = lo + shown - 1;
    const info = `<div class="page-info">Showing ${lo}–${hi} of ${totalRows} ${noun}</div>`;
    const btn = (p, label, { active = false, disabled = false } = {}) =>
      `<button class="page-btn${active ? " active" : ""}" data-page="${p}"${disabled ? " disabled" : ""}>${label}</button>`;
    const parts = [btn(cur - 1, "‹ Prev", { disabled: cur === 1 })];
    for (const p of pageList(cur, total)) {
      parts.push(p === "…" ? `<span class="page-ellipsis">…</span>` : btn(p, String(p), { active: p === cur }));
    }
    parts.push(btn(cur + 1, "Next ›", { disabled: cur === total }));
    return `<div class="pagination">${info}${parts.join("")}</div>`;
  }

  /* ── generic sortable table (drives both views) ── */
  function sortRows(rows, columns) {
    const col = columns.find(c => c.key === SORT.key) || columns[0];
    const dir = SORT.dir === "desc" ? -1 : 1;
    return rows.slice().sort((a, b) => {
      let va = col.sortVal(a), vb = col.sortVal(b);
      if (typeof va === "number" && typeof vb === "number") return (va - vb) * dir;
      return String(va ?? "").localeCompare(String(vb ?? ""), "en", { sensitivity: "base" }) * dir;
    });
  }

  function renderSortableTable(rows, columns, onRowClick, label) {
    _mainCtx = { rows, columns, onRowClick, label };
    statusEl.textContent = label || "";
    if (!rows.length) { resultsEl.innerHTML = ""; return; }
    const sorted = sortRows(rows, columns);

    // ── paginate (50 max per page) ──
    const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
    if (PAGE > totalPages) PAGE = totalPages;
    if (PAGE < 1) PAGE = 1;
    const start = (PAGE - 1) * PAGE_SIZE;
    const pageRows = sorted.slice(start, start + PAGE_SIZE);

    const arrow = k => SORT.key === k ? `<span class="sort-ind">${SORT.dir === "asc" ? "▲" : "▼"}</span>` : "";
    const head = columns.map(c => `<th data-key="${c.key}">${c.label} ${arrow(c.key)}</th>`).join("");
    const body = pageRows.map(r =>
      `<tr${r._easter ? ' class="easter-egg-row"' : ''}>${columns.map(c => `<td class="${c.cls}" data-label="${c.label}">${c.cell(r)}</td>`).join("")}</tr>`
    ).join("");
    resultsEl.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`
      + pagerHTML(PAGE, totalPages, pageRows.length, sorted.length, sorted.length === 1 ? "tin" : "tins");

    resultsEl.querySelectorAll("thead th").forEach(th => {
      th.addEventListener("click", () => {
        const k = th.dataset.key;
        if (SORT.key === k) SORT.dir = SORT.dir === "asc" ? "desc" : "asc";
        else { SORT.key = k; SORT.dir = "asc"; }
        render();
      });
    });
    resultsEl.querySelectorAll("tbody tr").forEach((tr, i) => {
      tr.addEventListener("click", () => onRowClick(pageRows[i]));
    });
    resultsEl.querySelectorAll(".page-btn[data-page]").forEach(b => {
      b.addEventListener("click", () => {
        if (b.disabled) return;
        PAGE = parseInt(b.dataset.page, 10);
        renderSortableTable(_mainCtx.rows, _mainCtx.columns, _mainCtx.onRowClick, _mainCtx.label);
        window.scrollTo(0, 0);
      });
    });
  }


  /* ── grouped (consolidated tins) ── */
  function activeMembers(t) {
    return (t.sizes || []).flatMap(sz => sz.members || []).filter(m => ACTIVE_SOURCES.has(m.source));
  }
  function totalMembers(t) {
    return (t.sizes || []).reduce((n, sz) => n + (sz.members || []).length, 0);
  }

  // Price for a tin: single value or a min–max range across its active listings.
  function tinPrice(t) {
    const nums = activeMembers(t).map(m => parseMoney(m.price)).filter(n => n != null);
    if (!nums.length) return null;
    return { lo: Math.min(...nums), hi: Math.max(...nums) };
  }
  function tinPriceLabel(t) {
    const p = tinPrice(t);
    if (!p) return "—";
    const f = n => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return p.lo === p.hi ? f(p.lo) : `${f(p.lo)}–${f(p.hi)}`;
  }
  // "Last updated" for a group: the latest source-specific date among active members.
  function tinLastUpdated(t) {
    return activeMembers(t).map(m => m.first_seen).filter(Boolean).sort().slice(-1)[0] || "";
  }
  // A tin is shown if any of its listings is from an active source.
  function tinActive(t) {
    return (t.sources || []).some(s => ACTIVE_SOURCES.has(s));
  }

  function tinWeights(t) {
    const ws = [...new Set((t.sizes || []).map(sz => sz.quantity).filter(Boolean))];
    if (!ws.length) return "—";
    return ws.length === 1 ? ws[0] : "Multiple";
  }

  // Returns avg $/oz across all active listings that have a parseable weight+price.
  // Grams and oz are both supported via the existing weightGrams() helper.
  function tinPricePerOzNum(t) {
    const samples = [];
    for (const sz of (t.sizes || [])) {
      const grams = weightGrams(sz.quantity);
      if (grams <= 0) continue;
      const oz = grams / 28.3495;
      for (const m of (sz.members || [])) {
        if (!ACTIVE_SOURCES.has(m.source)) continue;
        const price = parseMoney(m.price);
        if (price == null) continue;
        samples.push(price / oz);
      }
    }
    if (!samples.length) return null;
    return samples.reduce((a, b) => a + b, 0) / samples.length;
  }

  function tinPricePerOzLabel(t) {
    const v = tinPricePerOzNum(t);
    if (v == null) return "—";
    return "$" + v.toFixed(2) + "/oz";
  }

  function tinColumns() {
    return [
      { key: "name",  label: "Tin",          cls: "col-name",
        cell: t => { const n = activeMembers(t).length; return `${t.display_name}${n > 1 ? `<span class="listings-badge">${n} listings</span>` : ""}`; },
        sortVal: t => (t.display_name || "").toLowerCase() },
      { key: "price", label: "Price",        cls: "col-price",
        cell: t => tinPriceLabel(t),
        sortVal: t => { const p = tinPrice(t); return p ? p.lo : -1; } },
      { key: "weight", label: "Weight",      cls: "col-meta col-weight",
        cell: t => { const w = tinWeights(t); return w && w !== "—" && w !== "Multiple" ? `<span class="pill">${w}</span>` : w; },
        sortVal: t => Math.max(-1, ...(t.sizes || []).map(sz => weightGrams(sz.quantity))) },
      { key: "ppo",   label: "Avg $/oz",     cls: "col-ppo",
        cell: t => tinPricePerOzLabel(t),
        sortVal: t => tinPricePerOzNum(t) ?? -1 },
      { key: "year",  label: "Year",          cls: "col-meta col-year",
        cell: t => { const am = activeMembers(t); const y = am.length > 1 ? "Multiple" : (am[0] && am[0].year) || "—"; return y && y !== "—" && y !== "Multiple" ? `<span class="pill">${y}</span>` : y; },
        sortVal: t => Math.max(0, ...activeMembers(t).map(m => parseInt(m.year) || 0)) },
      { key: "updated", label: "Last Updated", cls: "col-meta col-updated",
        cell: t => fmt(tinLastUpdated(t)),
        sortVal: t => tinLastUpdated(t) },
      { key: "source", label: "Source",       cls: "col-meta col-source",
        cell: t => { const as = (t.sources || []).filter(s => ACTIVE_SOURCES.has(s)); const s = as.length > 1 ? "Multiple" : (as[0] || "—"); return s && s !== "—" && s !== "Multiple" ? `<span class="pill">${s}</span>` : s; },
        sortVal: t => { const as = (t.sources || []).filter(s => ACTIVE_SOURCES.has(s)); return as.length > 1 ? "Multiple" : (as[0] || "").toLowerCase(); } },
    ];
  }

  function ppoChartSVG(t, cw) {
    // `cw` is the host's pixel width. The SVG's viewBox uses those same pixel
    // units (1 unit = 1px), so font-size/radius values render at their literal
    // px size regardless of screen width — re-rendered on resize.
    // Plot $/oz (y) against the tin year (x). The tin year is the real
    // driver of price spread, so putting it on the axis turns the old
    // confound into the subject. Listings with no parseable year fall into a
    // separate "unknown" bucket pinned to the right edge.
    const known = [], unknown = [];
    for (const sz of (t.sizes || [])) {
      const grams = weightGrams(sz.quantity);
      if (grams <= 0) continue;
      const oz = grams / 28.3495;
      for (const m of (sz.members || [])) {
        if (!ACTIVE_SOURCES.has(m.source)) continue;
        const price = parseMoney(m.price);
        if (price == null) continue;
        const yr = parseInt(m.year, 10);
        const p = { ppo: price / oz, price: m.price || "—", source: m.source || "—",
          size: sz.quantity || "—", date: m.first_seen, year: m.year || "—" };
        if (Number.isFinite(yr)) { p.yr = yr; known.push(p); }
        else unknown.push(p);
      }
    }
    const pts = known.concat(unknown);
    if (pts.length < 1) return "";

    const W = Math.max(320, Math.round(cw || 500)), H = 170;
    const PL = 54, PR = 16, PT = 14, PB = 30;
    const plotW = W - PL - PR, plotH = H - PT - PB;

    // ── x domain: vintage years (+ optional "Current?" column) ──
    const hasKnown = known.length > 0, hasUnknown = unknown.length > 0;
    let minY, maxY, currentX = null;
    if (hasKnown) {
      minY = Math.min(...known.map(p => p.yr));
      maxY = Math.max(...known.map(p => p.yr));
      if (hasUnknown) currentX = maxY + Math.max(1, Math.round((maxY - minY) * 0.12));
    }
    known.forEach(p => p.x = p.yr);
    unknown.forEach(p => p.x = hasKnown ? currentX : 0);

    let xMin, xMax;
    if (hasKnown) { xMin = minY; xMax = hasUnknown ? currentX : maxY; }
    else { xMin = -1; xMax = 1; }              // all unknown → single centered column
    const sameX = xMin === xMax;               // one vintage only, no unknowns
    const xRange = sameX ? 1 : xMax - xMin;
    const toX = x => sameX ? PL + plotW / 2 : PL + ((x - xMin) / xRange) * plotW;

    // ── y domain: $/oz ──
    const ppoVals = pts.map(p => p.ppo);
    const rawMin = Math.min(...ppoVals), rawMax = Math.max(...ppoVals);
    const pad = (rawMax - rawMin) * 0.15 || rawMax * 0.15 || 1;
    const minPpo = rawMin - pad, maxPpo = rawMax + pad;
    const ppoRange = maxPpo - minPpo;
    const toY = ppo => PT + plotH - ((ppo - minPpo) / ppoRange) * plotH;

    function niceStep(range, n) {
      const rough = range / n;
      const mag = Math.pow(10, Math.floor(Math.log10(rough || 1)));
      for (const m of [1, 2, 2.5, 5, 10]) { if (m * mag >= rough) return m * mag; }
      return mag * 10;
    }
    const yStep  = niceStep(rawMax - rawMin || rawMax * 0.5 || 1, 3);
    const yStart = Math.floor(minPpo / yStep) * yStep;
    const yTicks = [];
    for (let v = yStart; v <= maxPpo + yStep * 0.01; v += yStep) {
      if (v >= minPpo - yStep * 0.01) yTicks.push(v);
    }

    // ── x ticks: one per distinct tin year (thinned to ~6), plus "unknown" ──
    const distinctYears = [...new Set(known.map(p => p.yr))].sort((a, b) => a - b);
    let yearTicks = distinctYears;
    if (distinctYears.length > 6) {
      yearTicks = Array.from({ length: 6 }, (_, i) =>
        distinctYears[Math.round(i * (distinctYears.length - 1) / 5)]);
      yearTicks = [...new Set(yearTicks)];
    }
    const xTicks = yearTicks.map(yr => ({ x: yr, label: String(yr) }));
    if (hasUnknown) xTicks.push({ x: hasKnown ? currentX : 0, label: hasKnown ? "Unknown" : "Tin Years Unknown" });

    // Build grid + y labels
    const grid = yTicks.map(v => {
      const y = toY(v).toFixed(1);
      return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#e5d5be" stroke-width="1"/>
        <text x="${PL - 6}" y="${y}" text-anchor="end" dominant-baseline="middle" fill="#7a5a3c" font-size="12">$${v.toFixed(2)}</text>`;
    }).join("");

    const xLabels = xTicks.map(tk => {
      const x = toX(tk.x).toFixed(1);
      return `<text x="${x}" y="${(PT + plotH + 18).toFixed(1)}" text-anchor="middle" fill="#7a5a3c" font-size="12">${esc(tk.label)}</text>`;
    }).join("");

    // ── median $/oz per column: short dash, no connecting line (a line would
    //    imply a continuity the sparse vintage data doesn't support) ──
    const byX = {};
    for (const p of pts) { (byX[p.x] = byX[p.x] || []).push(p.ppo); }
    const medians = Object.entries(byX)
      .filter(([, vals]) => vals.length > 1)
      .map(([x, vals]) => {
        const s = vals.slice().sort((a, b) => a - b);
        const mid = Math.floor(s.length / 2);
        const med = s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
        const cx = toX(Number(x));
        return `<line x1="${(cx - 13).toFixed(1)}" y1="${toY(med).toFixed(1)}" x2="${(cx + 13).toFixed(1)}" y2="${toY(med).toFixed(1)}" stroke="#FF69AF" stroke-width="2" stroke-opacity=".55"/>`;
      }).join("");

    // Individual dots — carry listing data for tooltip
    const dots = pts.map(p =>
      `<circle cx="${toX(p.x).toFixed(1)}" cy="${toY(p.ppo).toFixed(1)}" r="5"
        fill="#FF69AF" fill-opacity=".85" class="ppo-dot"
        data-ppo="${p.ppo.toFixed(2)}"
        data-price="${esc(p.price)}" data-source="${esc(p.source)}"
        data-size="${esc(p.size)}" data-date="${p.date || ""}" data-year="${esc(String(p.year))}"/>`
    ).join("");

    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;overflow:visible">
      ${grid}
      ${medians}
      ${dots}
      <line x1="${PL}" y1="${PT + plotH}" x2="${W - PR}" y2="${PT + plotH}" stroke="#e5d5be" stroke-width="1"/>
      ${xLabels}
    </svg>`;
  }

  function renderDetailContent(t) {
    DETAIL_PAGE = 1;   // opening a tin or changing source filters resets to page 1
    if (t._easter) {
      detailContent.innerHTML = `
        <div class="detail-card">
          <div class="detail-hero">
            <div class="detail-name">Easter Egg: Pouch of Longbottom Leaf</div>
            <div class="detail-price">Priceless</div>
          </div>
          <div class="detail-meta">
            <span class="lbl">Listings</span><span class="val">1 · Third Age 3001</span>
            <span class="lbl">Sources</span><span class="val">Longbottom, Southfarthing</span>
          </div>
          <div style="text-align:center;margin:1rem 0">
            <img src="gandalf-the-grey-smoking.gif" alt="Gandalf smoking" style="max-width:min(320px,100%);border-radius:6px">
          </div>
          <div class="detail-section-title">About this pouch</div>
          <div style="padding:0 0 1rem;line-height:1.65;font-size:0.92rem;color:var(--text)">
            <blockquote style="border-left:3px solid var(--accent);margin:0 0 1rem;padding:0 0 0 1rem;font-style:italic;color:var(--text-muted)">
              "There is another astonishing thing about Hobbits of old: that is, the love of pipe-weed."<br>
              <span style="font-style:normal;font-size:0.85em">— Meriadoc Brandybuck, <em>Herblore of the Shire</em></span>
            </blockquote>
            <p>Longbottom Leaf — first cultivated by Tobold Hornblower of Longbottom in the Southfarthing, circa SR 1070 — is widely acknowledged as among the finest leaf grown in the Shire. This particular sealed pouch was recovered from beneath Bilbo Baggins' favourite armchair at Bag End following his sudden and rather theatrical departure on the evening of his 111th birthday party.</p>
            <p><strong>Condition:</strong> Sealed. A small note reads: <em>"DO NOT SMOKE until the King returns — T.B."</em> The King has returned. The pouch remains unsmoked. Nobody is quite sure what Tobold would make of this.</p>
            <p><strong>Provenance:</strong> Gandalf is known to have sampled Longbottom Leaf extensively and appraised it as <em>"most excellent"</em> — though he declined to provide written documentation and was characteristically vague about where the pouch came from. Saruman, it is noted, also developed a fondness for the best Longbottom Leaf in his later years. Draw your own conclusions about its quality.</p>
            <p><strong>Tasting notes:</strong> Smooth. Very smooth. Makes excellent smoke rings if you've had 500 years of practice. Meriadoc Brandybuck reportedly blew a smoke-ship; Peregrin Took reportedly blew a smaller, sadder smoke-ship, which dissolved immediately.</p>
          </div>
          <div class="detail-section-title">1 listing</div>
          <table class="history-table">
            <colgroup><col class="ht-col-yr"><col class="ht-col-pr"><col><col class="ht-col-dt"></colgroup>
            <thead><tr><th>Year</th><th>Price</th><th>Source</th><th>Date</th></tr></thead>
            <tbody><tr>
              <td data-label="Year">TA 3001</td>
              <td class="price" data-label="Price">Not for sale</td>
              <td data-label="Source">The Green Dragon, Bywater<span class="listing-name">Pouch of Longbottom Leaf — sealed, provenance Bag End, slightly dusty</span></td>
              <td data-label="Date">22 Sep, TA 3001</td>
            </tr></tbody>
          </table>
        </div>`;
      return;
    }

    const activeCount = activeMembers(t).length;
    const totalCount = totalMembers(t);
    const listingsLabel = activeCount === totalCount
      ? `${totalCount}`
      : `${activeCount} of ${totalCount}`;
    const activeSrcs = (t.sources || []).filter(s => ACTIVE_SOURCES.has(s));
    const ppoLabel = tinPricePerOzLabel(t);

    detailContent.innerHTML = `
      <div class="detail-card">
        <div class="detail-hero">
          <div class="detail-name">${t.display_name}</div>
          <div class="detail-price">${tinPriceLabel(t)}</div>
          ${ppoLabel !== "—" ? `<div class="detail-ppo">${ppoLabel}/oz avg</div>` : ""}
        </div>
        <div class="detail-meta">
          <span class="lbl">Listings</span><span class="val">${listingsLabel}${t.years && t.years.length ? " · " + t.years.join(", ") : ""}</span>
          <span class="lbl">Sources</span><span class="val">${activeSrcs.join(", ") || "—"}</span>
        </div>
        <div class="ppo-chart-section"><div class="ppo-chart-label">$/oz by tin year</div><div class="ppo-chart-host"></div><div class="ppo-tooltip" hidden></div></div>
        <div class="detail-table-host"></div>
      </div>`;
    renderDetailTable(t, detailContent.querySelector(".detail-table-host"));
    requestAnimationFrame(() => renderChartInto(t));
  }

  // Build the SVG at the host's current pixel width and attach interactions.
  function renderChartInto(t) {
    const section = detailContent.querySelector('.ppo-chart-section');
    if (!section) return;
    const host = section.querySelector('.ppo-chart-host');
    const cw = host.clientWidth || section.clientWidth || 500;
    const svg = ppoChartSVG(t, cw);
    if (!svg) { section.remove(); return; }   // no plottable listings
    host.innerHTML = svg;
    attachChartListeners();
  }

  // Redraw the open chart on resize so text/dots keep their literal px size.
  let _chartResizeRAF = null;
  window.addEventListener('resize', () => {
    if (_chartResizeRAF) cancelAnimationFrame(_chartResizeRAF);
    _chartResizeRAF = requestAnimationFrame(() => {
      if (detailView.style.display !== 'none' && currentDetailTin && !currentDetailTin._easter) {
        renderChartInto(currentDetailTin);
      }
    });
  });

  let _chartDismiss = null;
  function attachChartListeners() {
    if (_chartDismiss) document.removeEventListener('click', _chartDismiss);
    const tooltip = detailContent.querySelector('.ppo-tooltip');
    const section = detailContent.querySelector('.ppo-chart-section');
    if (!tooltip || !section) return;

    detailContent.querySelectorAll('.ppo-dot').forEach(dot => {
      dot.addEventListener('click', e => {
        e.stopPropagation();
        const dr = dot.getBoundingClientRect(), sr = section.getBoundingClientRect();
        tooltip.style.left = (dr.left - sr.left + dr.width / 2) + 'px';
        tooltip.style.top  = (dr.top  - sr.top) + 'px';
        tooltip.innerHTML = `
          <div class="ppo-tt-ppo">$${parseFloat(dot.dataset.ppo).toFixed(2)}/oz</div>
          <div class="ppo-tt-row">${esc(dot.dataset.price)} · ${esc(dot.dataset.size)}</div>
          <div class="ppo-tt-row">${esc(dot.dataset.source)}</div>
          <div class="ppo-tt-row">${fmt(dot.dataset.date)}</div>
          <div class="ppo-tt-row">Tin year: ${esc(dot.dataset.year)}</div>`;
        tooltip.hidden = false;
      });
    });

    _chartDismiss = () => { tooltip.hidden = true; };
    document.addEventListener('click', _chartDismiss);
  }

  // Render a tin's detail view without touching history (popstate/deep-link path).
  function openDetail(t) {
    currentDetailTin = t;
    DETAIL_SORT = { key: "date", dir: "desc" };
    renderDetailContent(t);
    mainView.style.display = "none";
    detailView.style.display = "block";
    document.title = `${t.display_name} — ${BASE_TITLE}`;
    window.scrollTo(0, 0);
  }

  function showGroupDetail(t) {
    // Shareable, crawlable URL per tin; the static mirror lives at /tin/<slug>.html.
    history.pushState({ detail: t.id }, "", "?tin=" + tinSlug(t.id));
    openDetail(t);
  }

  // Render search results if there's a query, otherwise the full list —
  // always filtered by the active sources, in the current view mode.
  function render() {
    PAGE = 1;   // any filter/search/sort change returns to the first page
    const q = qEl.value.trim().toLowerCase();
    let list = TINS.filter(tinActive);
    if (q) list = list.filter(t =>
      t.display_name.toLowerCase().includes(q) ||
      (t.sizes || []).flatMap(sz => sz.members || []).some(m => (m.name || "").toLowerCase().includes(q)));
    renderSortableTable(list, tinColumns(), showGroupDetail, q
      ? `${list.length} tin${list.length === 1 ? "" : "s"} for "${qEl.value.trim()}"`
      : "");
  }

  function syncMobileSort() {
    if (mobileSort) mobileSort.value = `${SORT.key}:${SORT.dir}`;
  }

  // Source chips grouped by category; all start on by default.
  const SOURCE_GROUPS = [
    { name: "Fair Prices",        sources: ["Speak-Easy.Club", "pipestud.com"] },
    { name: "Desperate Bidders",  sources: ["Tinbids Auction (Sold)"] },
    { name: "Overpriced Gaugers", sources: ["Treasured Smokes", "4noggins.com"] },
  ];

  // Hash → single-source filter URLs (e.g. index.html#speakeasy)
  const HASH_TO_SOURCE = {
    "speakeasy":      "Speak-Easy.Club",
    "pipestud":       "pipestud.com",
    "tinbids":        "Tinbids Auction (Sold)",
    "treasuredsmokes":"Treasured Smokes",
    "4noggins":       "4noggins.com",
  };

  function buildSourceFilters() {
    const present = new Set(TINS.flatMap(t => t.sources || []));
    const known = new Set(SOURCE_GROUPS.flatMap(g => g.sources));
    const rest = [...present].filter(s => !known.has(s)).sort();
    const groups = SOURCE_GROUPS
      .map(g => ({ name: g.name, sources: g.sources.filter(s => present.has(s)) }))
      .filter(g => g.sources.length);
    if (rest.length) groups.push({ name: "Other", sources: rest });
    const sources = groups.flatMap(g => g.sources);

    // Hash URL → only that one source active; otherwise all sources on.
    const hash = location.hash.slice(1).toLowerCase();
    const hashSource = HASH_TO_SOURCE[hash];
    ACTIVE_SOURCES = (hashSource && present.has(hashSource))
      ? new Set([hashSource])
      : new Set(sources);

    const wrap = document.getElementById("source-filters");
    wrap.innerHTML = "";
    groups.forEach((group, i) => {
      if (i > 0) {
        const divider = document.createElement("div");
        divider.className = "chip-divider";
        wrap.appendChild(divider);
      }
      const groupEl = document.createElement("div");
      groupEl.className = "chip-group";
      const label = document.createElement("span");
      label.className = "chip-group-label";
      label.textContent = group.name;
      groupEl.appendChild(label);
      group.sources.forEach(src => {
        const on = ACTIVE_SOURCES.has(src);
        const btn = document.createElement("button");
        btn.className = on ? "chip on" : "chip";
        btn.textContent = src;
        btn.addEventListener("click", () => {
          if (ACTIVE_SOURCES.has(src)) ACTIVE_SOURCES.delete(src);
          else ACTIVE_SOURCES.add(src);
          btn.classList.toggle("on");
          if (detailView.style.display !== "none" && currentDetailTin) {
            renderDetailContent(currentDetailTin);
          }
          render();
        });
        groupEl.appendChild(btn);
      });
      wrap.appendChild(groupEl);
    });
  }

  /* ── dropdown ── */
  function closeDropdown() { dropEl.className = ""; dropEl.innerHTML = ""; }

  qEl.addEventListener("input", () => { closeDropdown(); render(); });
  qEl.addEventListener("blur", () => setTimeout(closeDropdown, 150));

  /* ── load ── */
  async function loadData() {
    // no-cache → always revalidate; otherwise a stale cached canonical.json can
    // lag behind a freshly deployed one and the grouped view comes up empty.
    const canonical = await fetch("canonical.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null).catch(() => null);

    const byName = (a, b) => (a.name || "").localeCompare(b.name || "", "en", { sensitivity: "base" });
    TINS = (canonical && canonical.tins ? canonical.tins : []).slice()
      .sort((a, b) => byName({ name: a.display_name }, { name: b.display_name }));
    TINS.forEach(t => { if (!t.sources) t.sources = t.source ? [t.source] : []; });

    // 1-in-20 chance: slip in a special listing
    if (Math.random() < 0.05 || location.hash === '#longbottom') {
      TINS.push({
        id: "easteregg|pouchoflongbottomleaf",
        brand: "Easter Egg",
        blend: "Pouch of Longbottom Leaf",
        display_name: "Pouch of Longbottom Leaf",
        sources: ["Speak-Easy.Club"],
        sizes: [],
        years: ["3001"],
        source: "Speak-Easy.Club",
        _easter: true,
      });
    }

    ENRICH = {};
    for (const t of TINS) for (const sz of (t.sizes || [])) for (const m of (sz.members || [])) {
      ENRICH[m.name] = { weight: sz.quantity || "", year: m.year || "" };
    }

    if (!TINS.length) {
      statusEl.textContent = "Could not load catalog. Please try refreshing.";
      return;
    }

    metaEl.textContent = "";
    buildSourceFilters();
    syncMobileSort();
    render();

    // ?tin=<slug> deep link (shared URLs + the static /tin/ pages' CTA).
    // Replace the current entry with the clean home URL first, so the in-app
    // Back button (history.back) lands on the list instead of leaving the site.
    const tinParam = new URLSearchParams(location.search).get("tin");
    if (tinParam) {
      history.replaceState(null, "", location.pathname);
      const t = TINS.find(x => tinSlug(x.id) === tinParam || x.id === tinParam);
      if (t) showGroupDetail(t);
    }
  }

  /* ── mobile sort (table headers are hidden on phones) ── */
  const mobileSort = document.getElementById("mobile-sort");
  mobileSort.addEventListener("change", () => {
    const [k, d] = mobileSort.value.split(":");
    SORT.key = k; SORT.dir = d;
    render();
  });

  loadData();
</script>

</body>
