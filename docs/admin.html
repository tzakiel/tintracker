<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Tin Tracker · Admin</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="theme-color" content="#5a3a24" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      font-family: "Work Sans", Helvetica, Arial, sans-serif;
      background-color: #f7f1e5;
      background-image: radial-gradient(rgba(180,142,96,.13) 1.5px, transparent 1.6px);
      background-size: 22px 22px;
      color: #3a2a1c;
      min-height: 100vh;
    }
    h1, .card h2, .stat-big { font-family: "Young Serif", Georgia, serif; font-weight: 400; }

    /* ── header ── */
    header {
      background: #5a3a24;
      color: #f5e8c8;
      padding: 1.4rem 1.5rem 1.6rem;
      text-align: center;
      box-shadow: 0 4px 14px rgba(90,58,36,.22);
    }
    header h1 { font-size: 1.7rem; letter-spacing: .03em; }
    header p  { margin-top: .35rem; font-size: .85rem; color: #e6c79c; }
    header a.back { color: #ffe9c2; text-decoration: underline; text-underline-offset: 2px; font-size: .82rem; }
    header a.back:hover { color: #fff; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    /* ── toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
    #updated { color: #8a6a4a; font-size: .82rem; font-style: italic; }
    button.refresh {
      font: inherit; font-size: .82rem; font-weight: 600;
      padding: .45rem 1rem; border: 2px solid #d8b483; border-radius: 999px;
      background: #fffdf8; color: #9b7b5a; cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    button.refresh:hover { border-color: #cf8a73; color: #b06a50; }

    /* ── summary strip ── */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 1rem; margin-bottom: 1.6rem; }
    .summary .card { text-align: center; }

    /* ── cards ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.1rem; }
    .card {
      background: #fffdf8;
      border: 2px solid #ecdcc0;
      border-radius: 16px;
      padding: 1.2rem 1.3rem;
      box-shadow: 0 4px 14px rgba(90,58,36,.10);
    }
    .card h2 { font-size: 1.15rem; color: #5a3a24; margin-bottom: .15rem; }
    .card .sub { font-size: .72rem; color: #b89a78; margin-bottom: .9rem; word-break: break-all; }

    .stat-big { font-size: 2.5rem; line-height: 1; color: #3a2a1c; }
    .stat-label { font-size: .74rem; color: #8a6a4a; text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }

    .added {
      display: inline-block; margin-top: .85rem;
      font-size: .92rem; font-weight: 600;
      padding: .25rem .7rem; border-radius: 999px;
    }
    .added.zero { background: #f0e8d8; color: #9b7b5a; }
    .added.some { background: #d9ead0; color: #3f6b2e; }

    .rows { margin-top: 1rem; border-top: 1px solid #efe4d0; padding-top: .8rem; }
    .row { display: flex; justify-content: space-between; gap: .8rem; font-size: .82rem; padding: .18rem 0; }
    .row .k { color: #8a6a4a; }
    .row .v { color: #3a2a1c; font-weight: 500; text-align: right; }
    .row .v.rel { color: #b89a78; font-weight: 400; }

    .card.error { border-color: #e0b4a4; }
    .card.error .stat-big { color: #b06a50; font-size: 1.1rem; font-family: "Work Sans", sans-serif; }
  </style>
</head>
<body>
  <header>
    <h1>Tin Tracker · Admin</h1>
    <p>Scrape &amp; catalog dashboard</p>
    <p style="margin-top:.6rem"><a class="back" href="index.html">← back to site</a></p>
  </header>

  <main>
    <div class="toolbar">
      <span id="updated">Loading…</span>
      <button class="refresh" id="refresh">↻ Refresh</button>
    </div>

    <section class="summary" id="summary"></section>
    <section class="grid" id="grid"></section>
  </main>

  <script>
    // Each scrape source writes its own self-describing file. Keep in sync with
    // SOURCE_FILES in index.html.
    const SOURCES = [
      { file: "products.json",               label: "Pipestud" },
      { file: "products_tinbids.json",        label: "Tinbids" },
      { file: "products_treasuredsmokes.json", label: "Treasured Smokes" },
      { file: "products_4noggins.json",       label: "4Noggins" },
    ];

    const fmtInt = n => n.toLocaleString();

    function fmtDateTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString(undefined, {
        year: "numeric", month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
      });
    }

    function relTime(iso) {
      if (!iso) return "";
      const then = new Date(iso).getTime();
      if (isNaN(then)) return "";
      const secs = Math.round((Date.now() - then) / 1000);
      const units = [["day", 86400], ["hour", 3600], ["minute", 60]];
      for (const [name, size] of units) {
        const v = Math.floor(secs / size);
        if (v >= 1) return `${v} ${name}${v === 1 ? "" : "s"} ago`;
      }
      return "just now";
    }

    // "Added on last scrape" = products whose first_seen equals the run's
    // last_scraped stamp. merge_products writes both from the same timestamp,
    // so newly-created records match exactly and prior-run records do not.
    function addedLastScrape(data) {
      const last = data.last_scraped;
      if (!last) return 0;
      return (data.products || []).filter(p => p.first_seen === last).length;
    }

    function card(src, data) {
      if (!data) {
        return `<div class="card error">
          <h2>${src.label}</h2>
          <div class="sub">${src.file}</div>
          <div class="stat-big">Could not load data file</div>
        </div>`;
      }
      const total = (data.products || []).length;
      const added = addedLastScrape(data);
      const last  = data.last_scraped;

      // Extra, source-specific rows where the data supports them.
      let extra = "";
      if (Array.isArray(data.pending)) {
        extra += `<div class="row"><span class="k">On watchlist</span><span class="v">${fmtInt(data.pending.length)}</span></div>`;
      }

      return `<div class="card">
        <h2>${src.label}</h2>
        <div class="sub">${src.file}</div>
        <div class="stat-big">${fmtInt(total)}</div>
        <div class="stat-label">listings in catalog</div>
        <span class="added ${added > 0 ? "some" : "zero"}">+${fmtInt(added)} added last scrape</span>
        <div class="rows">
          <div class="row"><span class="k">Last scrape</span><span class="v">${fmtDateTime(last)}</span></div>
          <div class="row"><span class="k"></span><span class="v rel">${relTime(last)}</span></div>
          ${extra}
        </div>
      </div>`;
    }

    function summaryCard(label, value, sub) {
      return `<div class="card">
        <div class="stat-big">${value}</div>
        <div class="stat-label">${label}</div>
        ${sub ? `<div class="row" style="justify-content:center;margin-top:.5rem"><span class="v rel">${sub}</span></div>` : ""}
      </div>`;
    }

    async function load() {
      document.getElementById("updated").textContent = "Loading…";
      const results = await Promise.all(SOURCES.map(s =>
        fetch(s.file, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null)
      ));

      // Per-source cards
      document.getElementById("grid").innerHTML =
        SOURCES.map((s, i) => card(s, results[i])).join("");

      // Roll-up summary
      let totalListings = 0, totalAdded = 0, latest = null;
      results.forEach(d => {
        if (!d) return;
        totalListings += (d.products || []).length;
        totalAdded += addedLastScrape(d);
        if (d.last_scraped && (!latest || new Date(d.last_scraped) > new Date(latest)))
          latest = d.last_scraped;
      });
      const okCount = results.filter(Boolean).length;
      document.getElementById("summary").innerHTML = [
        summaryCard("listings tracked (all sources)", fmtInt(totalListings)),
        summaryCard("added across last scrapes", `+${fmtInt(totalAdded)}`),
        summaryCard("sources reporting", `${okCount} / ${SOURCES.length}`),
        summaryCard("most recent scrape", fmtDateTime(latest), relTime(latest)),
      ].join("");

      document.getElementById("updated").textContent =
        "Page loaded " + new Date().toLocaleString();
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
