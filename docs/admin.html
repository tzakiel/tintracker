<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Tin Tracker · Admin</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="theme-color" content="#1a0e06" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-page);
      background-image: var(--bg-dot-gradient);
      background-size: var(--bg-dot-size);
      color: var(--text-primary);
      min-height: 100vh;
    }
    h1, .card h2, .stat-big { font-family: var(--font-display); font-weight: var(--weight-normal); }

    /* ── header ── */
    header {
      background: var(--bg-header);
      color: var(--text-header);
      padding: var(--padding-header);
      text-align: center;
      box-shadow: var(--shadow-header);
    }
    header h1 { font-size: var(--text-3xl); letter-spacing: var(--tracking-wide); }
    header p  { margin-top: .35rem; font-size: var(--text-md); color: var(--text-header-sub); }
    header a.back { color: var(--text-header-link); text-decoration: underline; text-underline-offset: 2px; font-size: var(--text-base); }
    header a.back:hover { color: #fff; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    /* ── toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
    #updated { color: var(--text-muted); font-size: var(--text-base); font-style: italic; }
    button.refresh {
      font: inherit; font-size: var(--text-base); font-weight: var(--weight-semibold);
      padding: .45rem 1rem; border: 2px solid var(--border-default); border-radius: var(--radius-pill);
      background: var(--bg-card); color: var(--text-soft); cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    button.refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ── summary strip ── */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 1rem; margin-bottom: 1.6rem; }
    .summary .card { text-align: center; }

    /* ── cards ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.1rem; }
    .card {
      background: var(--bg-card);
      border: 2px solid var(--border-card);
      border-radius: var(--radius-lg);
      padding: var(--padding-card-sm);
      box-shadow: var(--shadow-card);
    }
    .card h2 { font-size: var(--text-lg); color: var(--text-strong); margin-bottom: .15rem; }
    .card .sub { font-size: var(--text-xs); color: var(--text-faint); margin-bottom: .9rem; word-break: break-all; }

    .stat-big { font-size: var(--text-hero); line-height: 1; color: var(--text-primary); }
    .stat-label { font-size: var(--text-sm); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wider); margin-top: .2rem; }

    .added {
      display: inline-block; margin-top: .85rem;
      font-size: .92rem; font-weight: var(--weight-semibold);
      padding: .25rem .7rem; border-radius: var(--radius-pill);
    }
    .added.zero { background: var(--border-card); color: var(--text-soft); }
    .added.some { background: var(--bg-positive); color: var(--text-positive); }

    .rows { margin-top: 1rem; border-top: 1px solid var(--border-default); padding-top: .8rem; }
    .row { display: flex; justify-content: space-between; gap: .8rem; font-size: var(--text-base); padding: .18rem 0; }
    .row .k { color: var(--text-muted); }
    .row .v { color: var(--text-primary); font-weight: var(--weight-medium); text-align: right; }
    .row .v.rel { color: var(--text-faint); font-weight: var(--weight-normal); }

    .card.error { border-color: #e0b4a4; }
    .card.error .stat-big { color: #b06a50; font-size: var(--text-lg); font-family: var(--font-body); }

    /* ── scrape history ── */
    details.history { margin-top: .9rem; border-top: 1px solid var(--border-default); padding-top: .6rem; }
    details.history summary {
      cursor: pointer; font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-soft);
      list-style: none; outline: none; user-select: none;
    }
    details.history summary::-webkit-details-marker { display: none; }
    details.history summary::before { content: "▸ "; color: var(--accent); }
    details.history[open] summary::before { content: "▾ "; }
    .hist-scroll { max-height: 220px; overflow-y: auto; margin-top: .55rem; }
    .hist-row { display: flex; justify-content: space-between; gap: .8rem; font-size: var(--text-sm); padding: .26rem 0; border-bottom: 1px solid var(--border-card); }
    .hist-row:last-child { border-bottom: none; }
    .hist-row { cursor: pointer; align-items: center; }
    .hist-row:hover { background: var(--bg-surface); }
    .hist-row:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 1px; border-radius: var(--radius-xs); }
    .hist-row .when { color: var(--text-strong); }
    .hist-row .chev { color: var(--accent); font-size: var(--text-2xs); display: inline-block; transition: transform .12s; }
    .hist-row.open .chev { transform: rotate(90deg); }
    .hist-row .hist-meta { color: var(--text-faint); font-size: var(--text-xs); }
    .hist-row .cnt { color: var(--text-positive); font-weight: var(--weight-semibold); white-space: nowrap; }
    .hist-row .cnt.zeroadd { color: var(--text-faint); }

    /* expanded list of products added in a given scrape */
    .hist-detail { margin: .1rem 0 .55rem 1rem; padding-left: .8rem; border-left: 2px solid var(--border-default); }
    .hist-prod { display: flex; justify-content: space-between; gap: .7rem; font-size: var(--text-sm); padding: .16rem 0; }
    .hist-prod a { color: var(--text-strong); text-decoration: none; }
    .hist-prod a:hover { text-decoration: underline; }
    .hist-prod .pp { color: var(--text-positive); white-space: nowrap; }
    .hist-prod-empty { font-size: var(--text-sm); color: var(--text-faint); font-style: italic; padding: .2rem 0; }
    .hist-empty { font-size: var(--text-sm); color: var(--text-faint); font-style: italic; margin-top: .5rem; }
    .hist-note { font-size: var(--text-2xs); color: var(--text-faint); margin-top: .55rem; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>Tin Tracker · Admin</h1>
    <p>Scrape &amp; catalog dashboard</p>
    <p style="margin-top:.6rem"><a class="back" href="index.html">← back to site</a></p>
  </header>

  <main>
    <div class="toolbar">
      <span id="updated">Loading…</span>
      <button class="refresh" id="refresh">↻ Refresh</button>
    </div>

    <section class="summary" id="summary"></section>
    <section class="grid" id="grid"></section>
  </main>

  <script>
    // Each scrape source writes its own self-describing file.
    const SOURCES = [
      { file: "products.json",               label: "Pipestud" },
      { file: "products_tinbids.json",        label: "Tinbids" },
      { file: "products_treasuredsmokes.json", label: "Treasured Smokes" },
      { file: "products_4noggins.json",       label: "4Noggins" },
      { file: "products_speakeasy.json",      label: "Speak-Easy.Club" },
    ];

    const fmtInt = n => n.toLocaleString();
    const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function fmtDateTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString(undefined, {
        year: "numeric", month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
      });
    }

    function relTime(iso) {
      if (!iso) return "";
      const then = new Date(iso).getTime();
      if (isNaN(then)) return "";
      const secs = Math.round((Date.now() - then) / 1000);
      const units = [["day", 86400], ["hour", 3600], ["minute", 60]];
      for (const [name, size] of units) {
        const v = Math.floor(secs / size);
        if (v >= 1) return `${v} ${name}${v === 1 ? "" : "s"} ago`;
      }
      return "just now";
    }

    // "Added on last scrape" = products whose first_seen equals the run's
    // last_scraped stamp. merge_products writes both from the same timestamp,
    // so newly-created records match exactly and prior-run records do not.
    function addedLastScrape(data) {
      const last = data.last_scraped;
      if (!last) return 0;
      return (data.products || []).filter(p => p.first_seen === last).length;
    }

    // Scrape history merges two sources, keyed by timestamp:
    //   • data.scrape_history — the persistent run-by-run log (added going
    //     forward). Rich: includes zero-add runs, price changes, catalog total.
    //   • reconstructed from product first_seen — covers runs that predate the
    //     log (each distinct first_seen = a run that added that many listings).
    // The log wins on shared timestamps; reconstructed-only events fill the past.
    function scrapeHistory(data) {
      const byTs = new Map();

      // Reconstructed add-events (older history, before the log existed).
      const recon = new Map();
      for (const p of (data.products || [])) {
        if (!p.first_seen) continue;
        recon.set(p.first_seen, (recon.get(p.first_seen) || 0) + 1);
      }
      for (const [ts, n] of recon) {
        byTs.set(ts, { date: ts, added: n, logged: false });
      }

      // Persistent log entries override/augment by timestamp.
      for (const e of (data.scrape_history || [])) {
        if (!e || !e.date) continue;
        byTs.set(e.date, {
          date: e.date,
          added: e.added ?? 0,
          price_changed: e.price_changed,
          total: e.total,
          logged: true,
        });
      }

      return [...byTs.values()].sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function historyBlock(data) {
      const hist = scrapeHistory(data);
      if (!hist.length) {
        return `<details class="history"><summary>Scrape history</summary>
          <div class="hist-empty">No scrape history recorded yet.</div></details>`;
      }
      const rows = hist.map(h => {
        const meta = [];
        if (h.price_changed) meta.push(`~${fmtInt(h.price_changed)} price`);
        if (h.total != null) meta.push(`${fmtInt(h.total)} total`);
        const metaStr = meta.length ? ` <span class="hist-meta">· ${meta.join(" · ")}</span>` : "";
        const addCls = h.added > 0 ? "" : " zeroadd";

        // Products added in this run = those whose first_seen matches the row's
        // timestamp (merge stamps first_seen and the run from the same clock).
        const items = (data.products || []).filter(p => p.first_seen === h.date);
        const detail = items.length
          ? `<div class="hist-prods">${items.map(p => `<div class="hist-prod">
                ${p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a>`
                        : `<span>${escapeHtml(p.name)}</span>`}
                <span class="pp">${escapeHtml(p.price || "")}</span>
              </div>`).join("")}</div>`
          : `<div class="hist-prod-empty">No products to list for this run${h.added ? ` (logged +${fmtInt(h.added)})` : ""}.</div>`;

        return `<div class="hist-item">
            <div class="hist-row" role="button" tabindex="0">
              <span class="when"><span class="chev">▸</span> ${fmtDateTime(h.date)}${metaStr}</span>
              <span class="cnt${addCls}">+${fmtInt(h.added)}</span>
            </div>
            <div class="hist-detail" hidden>${detail}</div>
          </div>`;
      }).join("");
      return `<details class="history">
        <summary>Scrape history (${hist.length} runs)</summary>
        <div class="hist-scroll">${rows}</div>
        <div class="hist-note">Newest first. Per-run counts logged from now on; earlier rows reconstructed from when listings first appeared.</div>
      </details>`;
    }

    function card(src, data) {
      if (!data) {
        return `<div class="card error">
          <h2>${src.label}</h2>
          <div class="sub">${src.file}</div>
          <div class="stat-big">Could not load data file</div>
        </div>`;
      }
      const total = (data.products || []).length;
      const added = addedLastScrape(data);
      const last  = data.last_scraped;

      // Extra, source-specific rows where the data supports them.
      let extra = "";
      if (Array.isArray(data.pending)) {
        extra += `<div class="row"><span class="k">On watchlist</span><span class="v">${fmtInt(data.pending.length)}</span></div>`;
      }

      return `<div class="card">
        <h2>${src.label}</h2>
        <div class="sub">${src.file}</div>
        <div class="stat-big">${fmtInt(total)}</div>
        <div class="stat-label">listings in catalog</div>
        <span class="added ${added > 0 ? "some" : "zero"}">+${fmtInt(added)} added last scrape</span>
        <div class="rows">
          <div class="row"><span class="k">Last scrape</span><span class="v">${fmtDateTime(last)}</span></div>
          <div class="row"><span class="k"></span><span class="v rel">${relTime(last)}</span></div>
          ${extra}
        </div>
        ${historyBlock(data)}
      </div>`;
    }

    function summaryCard(label, value, sub) {
      return `<div class="card">
        <div class="stat-big">${value}</div>
        <div class="stat-label">${label}</div>
        ${sub ? `<div class="row" style="justify-content:center;margin-top:.5rem"><span class="v rel">${sub}</span></div>` : ""}
      </div>`;
    }

    async function load() {
      document.getElementById("updated").textContent = "Loading…";
      const results = await Promise.all(SOURCES.map(s =>
        fetch(s.file, { cache: "no-store" }).then(r => r.ok ? r.json() : null).catch(() => null)
      ));

      // Per-source cards
      document.getElementById("grid").innerHTML =
        SOURCES.map((s, i) => card(s, results[i])).join("");

      // Roll-up summary
      let totalListings = 0, totalAdded = 0, latest = null;
      results.forEach(d => {
        if (!d) return;
        totalListings += (d.products || []).length;
        totalAdded += addedLastScrape(d);
        if (d.last_scraped && (!latest || new Date(d.last_scraped) > new Date(latest)))
          latest = d.last_scraped;
      });
      const okCount = results.filter(Boolean).length;
      document.getElementById("summary").innerHTML = [
        summaryCard("listings tracked (all sources)", fmtInt(totalListings)),
        summaryCard("added across last scrapes", `+${fmtInt(totalAdded)}`),
        summaryCard("sources reporting", `${okCount} / ${SOURCES.length}`),
        summaryCard("most recent scrape", fmtDateTime(latest), relTime(latest)),
      ].join("");

      document.getElementById("updated").textContent =
        "Page loaded " + new Date().toLocaleString();
    }

    document.getElementById("refresh").addEventListener("click", load);

    // Expand/collapse a scrape's product list. Delegated on the grid, which
    // persists across re-renders. Clicks on the product links inside a detail
    // panel don't match .hist-row (the panel is a sibling), so they open freely.
    function toggleRow(row) {
      const detail = row.parentElement.querySelector(".hist-detail");
      if (!detail) return;
      const opening = detail.hasAttribute("hidden");
      detail.toggleAttribute("hidden", !opening);
      row.classList.toggle("open", opening);
    }
    const grid = document.getElementById("grid");
    grid.addEventListener("click", e => {
      const row = e.target.closest(".hist-row");
      if (row) toggleRow(row);
    });
    grid.addEventListener("keydown", e => {
      if (e.key !== "Enter" && e.key !== " ") return;
      const row = e.target.closest(".hist-row");
      if (row) { e.preventDefault(); toggleRow(row); }
    });

    load();
  </script>
</body>
</html>
